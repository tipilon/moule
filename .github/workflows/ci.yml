name: CI — Build & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.environment }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        environment: [esp32dev, esp32s3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # config.h n'est pas dans le dépôt (secrets) — on crée
      # une copie depuis l'exemple pour que la compilation passe
      - name: Préparer config.h (CI stub)
        run: cp src/config_example.h src/config.h

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Installer PlatformIO
        run: pip install --quiet platformio

      - name: Compiler — ${{ matrix.environment }}
        run: pio run --environment ${{ matrix.environment }}

      - name: Vérification de la taille du firmware
        run: pio run --environment ${{ matrix.environment }} --target size

      - name: Publier le firmware (.bin)
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.environment }}-${{ github.run_number }}
          path: .pio/build/${{ matrix.environment }}/firmware.bin
          retention-days: 30

  # Auto-correction du format de code (clang-format)
  # Si des fichiers ne respectent pas le style, ils sont corrigés
  # et un commit "style: clang-format" est poussé automatiquement.
  lint:
    name: Lint (clang-format auto-fix)
    runs-on: ubuntu-latest
    # Seulement sur push (pas sur PR d'une branche externe)
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          # Token avec droit d'écriture pour pouvoir pousser le commit de correction
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer clang-format
        run: sudo apt-get install -y --no-install-recommends clang-format

      - name: Appliquer clang-format
        run: |
          find src/ \( -name "*.cpp" -o -name "*.h" \) \
            -exec clang-format --style=file -i {} +

      - name: Committer les corrections (si nécessaire)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: clang-format auto-fix [skip ci]"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
