name: Release — Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build firmware de release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Préparer config.h (CI stub)
        run: cp src/config_example.h src/config.h

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Installer PlatformIO
        run: pip install --quiet platformio

      - name: Compiler firmware (release)
        run: pio run --environment esp32dev_release

      - name: Renommer le binaire avec la version
        run: |
          VERSION=${{ github.ref_name }}
          cp .pio/build/esp32dev_release/firmware.bin \
             moule-${VERSION}-esp32dev.bin

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: moulé ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            moule-${{ github.ref_name }}-esp32dev.bin
