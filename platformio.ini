; ============================================================
; PlatformIO Project Configuration — moulé
; https://docs.platformio.org/page/projectconf.html
; ============================================================

[platformio]
name            = moulé
description     = Projet ESP32 IoT — Connectivité WiFi
default_envs    = esp32dev

; ── Paramètres communs ──────────────────────────────────────
[env]
framework       = arduino
platform        = espressif32@^6.7.0
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder, default
lib_deps        =
    knolleary/PubSubClient @ ^2.8.0
    bblanchon/ArduinoJson @ ^7.1.0
    esphome/AsyncTCP-esphome @ ^2.1.0
build_flags     =
    -D ARDUINO_RUNNING_CORE=1
    -D ARDUINO_EVENT_RUNNING_CORE=1

; ── Environnement développement ─────────────────────────────
[env:esp32dev]
board           = esp32dev
upload_speed    = 921600
build_flags     =
    ${env.build_flags}
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -D ENV_DEV

; ── Environnement production (release) ─────────────────────
[env:esp32dev_release]
board           = esp32dev
upload_speed    = 921600
build_flags     =
    ${env.build_flags}
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_NONE
    -D ENV_PROD

; ── Environnement OTA (mise à jour sans fil) ────────────────
; Usage : pio run -e ota --target upload
; Le mot de passe OTA est lu depuis la variable d'environnement OTA_PWD
; Dans Git Bash : export OTA_PWD="votre_mot_de_passe" puis pio run -e ota -t upload
[env:ota]
board           = esp32dev
upload_protocol = espota
upload_port     = moule-esp32.local
upload_flags    = --auth=${sysenv.OTA_PWD}
build_flags     =
    ${env.build_flags}
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -D ENV_DEV

; ── Environnement ESP32-S3 ──────────────────────────────────
[env:esp32s3]
board           = esp32-s3-devkitc-1
upload_speed    = 921600
build_flags     =
    ${env.build_flags}
    -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_INFO
    -D ENV_DEV
    -D BOARD_ESP32_S3
